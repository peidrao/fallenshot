name: Main CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate Python Sources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-gi \
            python3-gi-cairo \
            python3-dbus \
            gir1.2-gtk-4.0 \
            gir1.2-gdkpixbuf-2.0 \
            gir1.2-gstreamer-1.0 \
            gir1.2-gst-plugins-base-1.0 \
            gstreamer1.0-plugins-base

      - name: Compile source files
        run: python -m compileall -q src

      - name: Runtime smoke import (system Python + GI/DBus)
        run: /usr/bin/python3 -c "import gi, dbus; from src.main import FallenshotApp; print('ok')"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip -r requirements.txt

      - name: Lint with ruff
        run: ruff check src tests

      - name: Run unit tests
        run: pytest -q --tb=short --junitxml=report.xml

      - name: Generate tests badge
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          mkdir -p badges
          genbadge tests -i report.xml -o badges/tests.svg

      - name: Commit badge
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/tests.svg
          git diff --cached --quiet || git commit -m "ci: update tests badge [skip ci]"
          git push
