[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = [
    # gi.require_version() must precede gi.repository imports — this is required
    # by the GObject introspection binding and cannot be reordered.
    "E402",
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E501"]
