app-id: io.github.fallenshot
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
command: fallenshot

finish-args:
  # Wayland display
  - --socket=wayland
  # DBus de sessão (xdg-desktop-portal)
  - --socket=session-bus
  - --share=ipc
  # Portal de screenshot e file chooser
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.FileChooser
  # Apenas ~/Pictures para salvar screenshots
  - --filesystem=xdg-pictures

modules:
  # dbus-python não está disponível no GNOME SDK — compilar via pip
  - name: python3-dbus
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --prefix=/app dbus-python==1.3.2
    sources:
      - type: archive
        url: https://pypi.io/packages/source/d/dbus-python/dbus-python-1.3.2.tar.gz
        sha256: ad67819308618b5069537be237f8e68ca1c7fcc95ee4a121fe6845b1418248f8

  - name: fallenshot
    buildsystem: simple
    build-commands:
      # Instala o pacote Python
      - mkdir -p /app/lib/fallenshot
      - cp -r src /app/lib/fallenshot/src
      - touch /app/lib/fallenshot/src/__init__.py

      # Wrapper executável
      - install -Dm755 fallenshot /app/bin/fallenshot

      # Ícone
      - install -Dm644 icons/fallenshot.png
          /app/share/icons/hicolor/256x256/apps/io.github.fallenshot.png

      # .desktop
      - install -Dm644 io.github.fallenshot.desktop
          /app/share/applications/io.github.fallenshot.desktop

      # AppStream metainfo
      - install -Dm644 io.github.fallenshot.metainfo.xml
          /app/share/metainfo/io.github.fallenshot.metainfo.xml

    sources:
      - type: git
        url: https://github.com/SEU_USUARIO/fallenshot.git
        branch: main
