name: Main CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate Python Sources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile source files
        run: python -m compileall -q src
